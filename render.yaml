databases:
  - name: smartware-db
    databaseName: smartware
    plan: free
    region: singapore

services:
  # Main Web Application
  - type: web
    name: smartware-store
    plan: free
    region: singapore
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma db push --force-reset && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smartware-db
          property: connectionString
      # 👇 Set these manually in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false
      - key: UNSPLASH_ACCESS_KEY
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: TIKTOK_PIXEL_ID
        sync: false
      - key: TIKTOK_ACCESS_TOKEN
        sync: false
      - key: POSTEX_API_KEY
        sync: false
      - key: POSTEX_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false

  # Cron: Process Message Queue (every 5 minutes)
  - type: cron
    name: process-message-queue
    plan: free
    region: singapore
    runtime: node
    buildCommand: echo "no build needed"
    startCommand: >
      curl -s -X GET
      "$RENDER_EXTERNAL_URL/api/cron/process-message-queue"
    schedule: "*/5 * * * *"
    envVars:
      - key: RENDER_EXTERNAL_URL
        sync: false

  # Cron: Process Abandoned Carts (every 30 minutes)
  - type: cron
    name: process-abandoned-carts
    plan: free
    region: singapore
    runtime: node
    buildCommand: echo "no build needed"
    startCommand: >
      curl -s -X GET
      "$RENDER_EXTERNAL_URL/api/cron/process-abandoned-carts"
    schedule: "*/30 * * * *"
    envVars:
      - key: RENDER_EXTERNAL_URL
        sync: false
