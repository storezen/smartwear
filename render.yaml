databases:
  - name: smartware-db
    databaseName: smartware
    plan: free
    region: singapore

services:
  # Main Web Application
  - type: web
    name: smartware-store
    plan: free
    region: singapore
    runtime: node
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smartware-db
          property: connectionString
      # 👇 Set these manually in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false
      - key: UNSPLASH_ACCESS_KEY
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: TIKTOK_PIXEL_ID
        sync: false
      - key: TIKTOK_ACCESS_TOKEN
        sync: false
      - key: POSTEX_API_KEY
        sync: false
      - key: POSTEX_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false

